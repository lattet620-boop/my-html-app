    <style>
        :root { --primary: #00ff87; --secondary: #3a7bd5; --success: #00ff87; --danger: #ff0055; --dark: #080e1a; --text: #1e293b; --light-green: #90ee90; --card-bg: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Montserrat', 'Pyidaungsu', sans-serif; }
        body { background: #f0f2f5; margin: 0; height: 100dvh; display: flex; flex-direction: column; color: var(--text); }

        .screen { position: fixed; inset: 0; z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle, #1e293b, #080e1a); overflow-y: auto; }
        .card { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(20px); width: 100%; max-width: 500px; border-radius: 30px; border: 4px solid var(--primary); text-align: center; overflow: hidden; box-shadow: 0 0 30px rgba(0, 255, 135, 0.3); color: white; margin: auto; }
        .card-header { background: linear-gradient(90deg, #00b09b, #96c93d); padding: 35px; font-family: 'Orbitron'; font-weight: bold; font-size: 24px; }

        /* အသစ်ထည့်သွင်းထားသော သင်တန်းကြော်ငြာ CSS ဒီဇိုင်း */
        .promo-box { background: rgba(255, 255, 255, 0.08); border-radius: 15px; padding: 18px; margin-bottom: 25px; border: 1px dashed rgba(0, 255, 135, 0.4); text-align: center; }
        .promo-title { font-size: 22px; font-weight: 700; color: var(--primary); margin: 0 0 8px 0; letter-spacing: 1px; }
        .promo-sub { font-size: 15px; color: #e2e8f0; margin: 0 0 15px 0; font-weight: bold; }
        .promo-link { display: inline-flex; align-items: center; justify-content: center; background: #0088cc; color: white; text-decoration: none; padding: 12px 20px; border-radius: 25px; font-weight: bold; font-size: 14px; margin-bottom: 12px; transition: 0.2s; width: 100%; box-shadow: 0 4px 10px rgba(0,136,204,0.3); }
        .promo-link:hover { opacity: 0.9; }
        .promo-phone { display: inline-flex; align-items: center; justify-content: center; background: #25d366; color: black; text-decoration: none; padding: 12px 20px; border-radius: 25px; font-weight: 900; font-size: 15px; width: 100%; box-shadow: 0 4px 10px rgba(37,211,102,0.3); }

        /* Exam Screen Layout */
        #exam-screen { display: none; flex-direction: column; height: 100vh; }
        .ubt-header { position: sticky; top: 0; z-index: 100; display: flex; background: #0f172a; color: #fff; height: 60px; border-bottom: 4px solid var(--primary); }
        .h-box { flex: 1; border-right: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }

        /* Scrollable Area */
        .scroll-view { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 25px; padding-bottom: 50px; }
        
        .q-container { background: var(--card-bg); border-radius: 20px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .q-text { font-weight: bold; font-size: 16px; margin-bottom: 15px; color: #334155; }
        .q-img { max-width: 100%; max-height: 200px; border-radius: 10px; margin-bottom: 15px; display: block; border: 1px solid #eee; }

        /* Option Grid inside each question */
        .a-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .ans-item { background: #f8fafc; border-radius: 12px; border: 2px solid #e2e8f0; cursor: pointer; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; font-weight: 700; font-size: 14px; color: var(--text); transition: 0.2s; min-height: 60px; }
        
        .ans-item.selected { background: var(--light-green) !important; border-color: #32cd32 !important; }
        .ans-item.correct-ans { background: #dcfce7 !important; border-color: var(--success) !important; }
        .ans-item.wrong-ans { background: #fee2e2 !important; border-color: var(--danger) !important; }

        .submit-area { padding: 20px; background: #fff; border-top: 1px solid #e2e8f0; text-align: center; }
        .submit-btn { width: 100%; max-width: 400px; padding: 18px; border-radius: 15px; background: var(--danger); color: #fff; border: none; font-weight: 900; font-size: 18px; cursor: pointer; }

        /* Keypad for CB */
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 250px; margin: 10px auto; }
        .key { background: #f1f5f9; border: none; padding: 12px; border-radius: 10px; font-size: 18px; font-weight: 800; cursor: pointer; color: var(--dark); }
    </style>
</head>

        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    };

    function startExam() {

            let originalCorrect = q.c;

            let newCorrectIdx = shuffledA.findIndex(opt => (opt.t === originalCorrect || opt.i === originalCorrect));
            return { ...q, a: shuffledA, c: newCorrectIdx };
        });
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('exam-screen').style.display = 'flex';
        renderAll();
        timerId = setInterval(() => {
            if(examClock > 0) {
                examClock--;
                let m = Math.floor(examClock/60), s = examClock%60;
                document.getElementById('timer-val').innerText = `${m}:${s<10?'0':''}${s}`;
            } else { finishExam(); }
        }, 1000);
    }

    function renderAll() {
        const container = document.getElementById('questions-list');
        container.innerHTML = questions.map((q, qIdx) => {
            let optionsHtml = q.a.map((opt, aIdx) => {
                let content = opt.t ? `<span>${opt.t}</span>` : `<img src="${opt.i}" style="height:50px;">`;
                let statusClass = "";
                if (isReviewMode) {
                    if (aIdx === q.c) statusClass = "correct-ans";
                    else if (userAns[qIdx] === aIdx) statusClass = "wrong-ans";
                } else if (userAns[qIdx] === aIdx) {
                    statusClass = "selected";
                }
                return `<div class="ans-item ${statusClass}" onclick="pick(${qIdx}, ${aIdx})">${content}</div>`;
            }).join('');

            return `
                <div class="q-container" id="q-block-${qIdx}">
                    <div class="q-text">${qIdx + 1}. ${q.q}</div>
                    ${q.img ? `<img src="${q.img}" class="q-img">` : ''}
                    <div class="a-grid">${optionsHtml}</div>
                </div>
            `;
        }).join('');
        document.getElementById('rem-count').innerText = userAns.filter(a => a !== null).length;
    }

        if (isReviewMode) return;
