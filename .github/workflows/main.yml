name: HTML to APK (Final Success SDK 33)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Folder and Tools
        run: |
          npm install -g @ionic/cli @capacitor/assets
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p assets www
          cp icon.png assets/icon.png || echo "icon.png not found"
          cp splash.png assets/splash.png || echo "splash.png not found"
          cp -r ./* www/ || true
          rm -rf www/.github www/assets www/www || true

      - name: Initialize and Configure Android
        run: |
          npx cap init ubt5 com.ubt5.app --web-dir www
          npx cap add android
          
          # Android Variables ကို အသေသတ်မှတ်ခြင်း
          cat <<EOF > android/variables.gradle
          ext {
              minSdkVersion = 22
              compileSdkVersion = 33
              targetSdkVersion = 33
              coreSplashScreenVersion = '1.0.0'
              androidxActivityVersion = '1.7.0'
              androidxAppCompatVersion = '1.6.1'
              androidxCoordinatorLayoutVersion = '1.2.0'
              androidxCoreVersion = '1.10.0'
              androidxFragmentVersion = '1.5.6'
          }
          EOF

          # Version Code ကို 6 သို့ မြှင့်ခြင်း
          sed -i 's/versionCode [0-9]*/versionCode 6/' android/app/build.gradle
          
          npx capacitor-assets generate --android --assetPath assets
          
          # Manifest ဖိုင်ကို Error ကင်းအောင် အသစ်ပြန်ရေးခြင်း
          cat <<EOF > android/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="ubt5"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:usesCleartextTraffic="true"
                  android:theme="@style/AppTheme">
                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                      android:name="com.ubt5.app.MainActivity"
                      android:label="ubt5"
                      android:exported="true"
                      android:theme="@style/AppTheme.NoActionBarLaunch">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
              <uses-permission android:name="android.permission.INTERNET" />
          </manifest>
          EOF

          export JAVA_HOME=$JAVA_HOME_17_X64
          npx cap sync android
          cd android && ./gradlew clean assembleRelease

      - name: Sign Android APK with Release Key
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.jks
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          $BUILD_TOOLS_PATH/zipalign -v 4 android/app/build/outputs/apk/release/app-release-unsigned.apk ubt5-aligned.apk
          $BUILD_TOOLS_PATH/apksigner sign --ks release.jks --ks-pass pass:$KEYSTORE_PASSWORD --ks-key-alias $KEY_ALIAS --out KEEC13-ubt5-app.apk ubt5-aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KEEC13-ubt5-Final-Stable-APK
          path: KEEC13-ubt5-app.apk
