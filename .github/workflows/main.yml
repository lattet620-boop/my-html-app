name: HTML to APK (SDK 34 + Official Release Signed)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Prepare Folder and Install Tools
        run: |
          npm install -g @ionic/cli @capacitor/assets
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p assets
          cp icon.png assets/icon.png || echo "icon.png not found"
          cp splash.png assets/splash.png || echo "splash.png not found"
          mkdir -p www
          cp -r ./* www/ || true
          rm -rf www/.github www/assets www/www || true

      - name: Initialize and Build Android
        run: |
          npx cap init ubt5 com.ubt5.app --web-dir www
          npx cap add android
          
          # --- SDK Version မြှင့်တင်ခြင်း (Android 14 အတွက်) ---
          sed -i 's/compileSdkVersion = [0-9]*/compileSdkVersion = 34/' android/variables.gradle
          sed -i 's/targetSdkVersion = [0-9]*/targetSdkVersion = 34/' android/variables.gradle
          
          npx capacitor-assets generate --android --assetPath assets
          
          # Webview နှင့် Network Security ပြင်ဆင်ခြင်း
          sed -i 's/android:usesCleartextTraffic="false"/android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml
          
          echo '{"appId": "com.ubt5.app", "appName": "ubt5", "webDir": "www", "server": {"allowNavigation": ["*"], "cleartext": true}}' > capacitor.config.json

          export JAVA_HOME=$JAVA_HOME_21_X64
          npx cap sync android
          
          # Release Version အဖြစ် တည်ဆောက်ခြင်း
          cd android && ./gradlew assembleRelease

      - name: Sign Android APK with Release Key
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.jks
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          
          # 1. Zipalign လုပ်ခြင်း
          $BUILD_TOOLS_PATH/zipalign -v 4 android/app/build/outputs/apk/release/app-release-unsigned.apk ubt5-aligned.apk
          
          # 2. တရားဝင် လက်မှတ်ထိုးခြင်း
          $BUILD_TOOLS_PATH/apksigner sign --ks release.jks \
            --ks-pass pass:$KEYSTORE_PASSWORD \
            --ks-key-alias $KEY_ALIAS \
            --out KEEC13-ubt5-app.apk ubt5-aligned.apk
          
          echo "✅ APK Signing with SDK 34 Complete!"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KEEC13-ubt5-App-APK-SDK34
          path: KEEC13-ubt5-app.apk
