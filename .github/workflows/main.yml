name: HTML to APK (Final Success with Icon)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Prepare Folder and Install Tools
        run: |
          # Tool များသွင်းခြင်း
          npm install -g @ionic/cli @capacitor/assets
          npm install @capacitor/core @capacitor/cli @capacitor/android

          # Icon နှင့် Splash အတွက် assets folder တည်ဆောက်ပြီး ပုံများကူးထည့်ခြင်း
          mkdir -p assets
          cp icon.png assets/icon.png || echo "icon.png not found"
          cp splash.png assets/splash.png || echo "splash.png not found"

          # Web App (HTML) များအတွက် www folder ပြင်ဆင်ခြင်း
          mkdir -p www
          cp -r ./* www/ || true
          rm -rf www/.github www/assets www/www || true

      - name: Initialize and Build Android
        run: |
          # Project ကို www directory နဲ့ စတင်ခြင်း
          npx cap init ubt5 com.ubt5.app --web-dir www
          npx cap add android
          
          # Icon နှင့် Splash Screen ကို assets folder ထဲမှ ထုတ်ယူအသုံးပြုခြင်း
          npx capacitor-assets generate --android --assetPath assets

          # Webview Settings ပြင်ဆင်ခြင်း
          sed -i 's/android:usesCleartextTraffic="false"/android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml
          
          # Local file access config ထည့်ခြင်း
          echo '{"appId": "com.ubt5.app", "appName": "ubt5", "webDir": "www", "server": {"allowNavigation": ["*"], "cleartext": true}}' > capacitor.config.json

          export JAVA_HOME=$JAVA_HOME_21_X64
          npx cap sync android
          cd android && ./gradlew assembleDebug

      - name: Export APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk ./KEEC13-ubt5-app.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KEEC13-ubt5-App-APK
          path: KEEC13-ubt5-app.apk
